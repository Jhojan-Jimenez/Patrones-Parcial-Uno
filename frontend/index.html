<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sistema de Pedidos</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f0f2f5; color: #333; }
    header {
      background: #1a73e8; color: white; padding: 16px 32px;
      display: flex; align-items: center; gap: 12px;
    }
    header h1 { font-size: 1.4rem; }
    .badge {
      background: #34a853; color: white; font-size: 0.75rem;
      padding: 2px 10px; border-radius: 12px;
    }
    main { max-width: 900px; margin: 32px auto; padding: 0 16px; }
    .card {
      background: white; border-radius: 8px; padding: 24px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1); margin-bottom: 24px;
    }
    .card h2 { margin-bottom: 16px; font-size: 1.1rem; color: #1a73e8; }
    table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    th { background: #f8f9fa; text-align: left; padding: 10px 12px;
         border-bottom: 2px solid #dee2e6; color: #555; }
    td { padding: 10px 12px; border-bottom: 1px solid #f0f0f0; }
    tr:hover td { background: #f8f9fa; }
    .status { display: inline-block; padding: 2px 10px; border-radius: 12px;
              font-size: 0.8rem; font-weight: bold; }
    .status.ok { background: #e6f4ea; color: #34a853; }
    .status.warn { background: #fef7e0; color: #f9ab00; }
    .loading { text-align: center; padding: 40px; color: #888; }
    .error { color: #d93025; background: #fce8e6; padding: 12px;
             border-radius: 6px; margin-bottom: 16px; }
    .api-url { font-family: monospace; font-size: 0.8rem;
               color: #888; margin-bottom: 8px; }
  </style>
</head>
<body>
  <header>
    <h1>Sistema de Pedidos</h1>
    <span class="badge">DEV</span>
  </header>

  <main>
    <!-- Clientes -->
    <div class="card">
      <h2>Clientes</h2>
      <p class="api-url">GET /api/petclinic/api/owners</p>
      <div id="owners-error"></div>
      <div id="owners-loading" class="loading">Cargando...</div>
      <table id="owners-table" style="display:none">
        <thead>
          <tr>
            <th>#</th><th>Nombre</th><th>Apellido</th>
            <th>Ciudad</th><th>Teléfono</th><th>Estado</th>
          </tr>
        </thead>
        <tbody id="owners-body"></tbody>
      </table>
    </div>

    <!-- Veterinarios / Empleados -->
    <div class="card">
      <h2>Empleados / Especialistas</h2>
      <p class="api-url">GET /api/petclinic/api/vets</p>
      <div id="vets-error"></div>
      <div id="vets-loading" class="loading">Cargando...</div>
      <table id="vets-table" style="display:none">
        <thead>
          <tr><th>#</th><th>Nombre</th><th>Apellido</th><th>Especialidades</th><th>Estado</th></tr>
        </thead>
        <tbody id="vets-body"></tbody>
      </table>
    </div>
  </main>

  <script>
    async function fetchData(endpoint, loadingId, errorId, tableId, bodyId, renderRow) {
      try {
        const res = await fetch(endpoint);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        const items = Array.isArray(data) ? data : (data.items || data.content || []);
        document.getElementById(loadingId).style.display = 'none';
        const tbody = document.getElementById(bodyId);
        tbody.innerHTML = '';
        items.forEach((item, i) => {
          const tr = document.createElement('tr');
          tr.innerHTML = renderRow(i + 1, item);
          tbody.appendChild(tr);
        });
        document.getElementById(tableId).style.display = 'table';
      } catch (e) {
        document.getElementById(loadingId).style.display = 'none';
        document.getElementById(errorId).innerHTML =
          `<div class="error">Error al conectar con el backend: ${e.message}</div>`;
      }
    }

    fetchData(
      '/api/petclinic/api/owners',
      'owners-loading', 'owners-error', 'owners-table', 'owners-body',
      (i, o) => `
        <td>${i}</td>
        <td>${o.firstName || '-'}</td>
        <td>${o.lastName || '-'}</td>
        <td>${o.city || '-'}</td>
        <td>${o.telephone || '-'}</td>
        <td><span class="status ok">Activo</span></td>
      `
    );

    fetchData(
      '/api/petclinic/api/vets',
      'vets-loading', 'vets-error', 'vets-table', 'vets-body',
      (i, v) => `
        <td>${i}</td>
        <td>${v.firstName || '-'}</td>
        <td>${v.lastName || '-'}</td>
        <td>${(v.specialties || []).map(s => s.name).join(', ') || 'General'}</td>
        <td><span class="status ok">Disponible</span></td>
      `
    );
  </script>
</body>
</html>
