name: CI Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend-app/**'

permissions:
  contents: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Calcular tag de imagen
        id: tag
        run: echo "value=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend-app
          push: true
          tags: |
            jhojanjimenez/pedidos-backend:${{ steps.tag.outputs.value }}
            jhojanjimenez/pedidos-backend:latest

      - name: Update image tag in values.yaml
        run: |
          sed -i "s|tag: \".*\" # backend-tag|tag: \"${{ steps.tag.outputs.value }}\" # backend-tag|" charts/pedido-app/values.yaml

      - name: Commit and push values.yaml
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add charts/pedido-app/values.yaml
          git commit -m "ci: update backend image tag to ${{ steps.tag.outputs.value }}"
          git push
