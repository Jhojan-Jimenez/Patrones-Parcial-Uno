# ============================================================
# VALUES BASE — compartido entre todos los ambientes
# Sobreescribir en values-dev.yaml / values-prod.yaml
# ============================================================

# --------------- BACKEND ---------------
backend:
  image:
    repository: jhojanjimenez/pedidos-backend
    tag: "1.0.0" # backend-tag
    pullPolicy: IfNotPresent

  replicaCount: 1

  service:
    type: ClusterIP
    port: 8080

  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

  hpa:
    enabled: true
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70

  # Referencia al subchart postgresql (nombre del Service generado por Bitnami)
  db:
    host: "pedido-app-postgresql"   # <release-name>-postgresql
    port: 5432
    name: pedidos
    # Las credenciales deben coincidir con postgresql.auth
    username: pedido_user
    password: "changeme123"

# --------------- FRONTEND ---------------
frontend:
  image:
    repository: jhojanjimenez/pedidos-frontend
    tag: "1.0.0" # frontend-tag
    pullPolicy: IfNotPresent

  replicaCount: 1

  service:
    type: ClusterIP
    port: 80

  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "200m"
      memory: "128Mi"

# --------------- POSTGRESQL (Bitnami subchart) ---------------
postgresql:
  enabled: true
  auth:
    username: pedido_user
    password: "changeme123"     # sobreescribir en values-prod.yaml con secreto externo
    database: pedidos
  primary:
    persistence:
      enabled: true
      size: 1Gi

# --------------- INGRESS ---------------
ingress:
  enabled: true
  className: nginx
  host: pedidos.local
  annotations: {}
