apiVersion: v2
name: pedido-app
description: Sistema de gestión de pedidos — backend Spring Boot, frontend React, base de datos PostgreSQL
type: application
version: 0.1.0
appVersion: "1.0.0"

dependencies:
  - name: postgresql
    version: "~15.5.0"
    repository: "https://charts.bitnami.com/bitnami"
    condition: postgresql.enabled
  # Subcharts locales — las fuentes están en charts/_backend y charts/_frontend
  # (el prefijo _ hace que Helm ignore esos directorios al cargar; solo usa los .tgz generados)
  - name: backend
    version: "0.1.0"
    repository: "file://charts/_backend"
  - name: frontend
    version: "0.1.0"
    repository: "file://charts/_frontend"
