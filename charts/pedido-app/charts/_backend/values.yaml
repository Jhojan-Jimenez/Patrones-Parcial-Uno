# Valores por defecto del subchart backend
# Son sobreescritos por el chart padre en la sección "backend:" de values.yaml

image:
  repository: springcommunity/spring-petclinic-rest
  tag: "3.2.1"
  pullPolicy: IfNotPresent

replicaCount: 1

service:
  type: ClusterIP
  port: 8080

resources:
  requests:
    cpu: "100m"
    memory: "256Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

db:
  host: "pedido-app-postgresql"
  port: 5432
  name: pedidos
  username: pedido_user
  password: "changeme123"
