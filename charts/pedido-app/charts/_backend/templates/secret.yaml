apiVersion: v1
kind: Secret
metadata:
  name: {{ include "backend.fullname" . }}-db-secret
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "backend.labels" . | nindent 4 }}
type: Opaque
data:
  # Los valores vienen de .Values.db.username / .Values.db.password
  # que el chart padre propaga bajo la clave "backend:" en values.yaml
  DB_USERNAME: {{ .Values.db.username | b64enc | quote }}
  DB_PASSWORD: {{ .Values.db.password | b64enc | quote }}
