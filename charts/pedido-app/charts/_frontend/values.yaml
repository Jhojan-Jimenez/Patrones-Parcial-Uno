# Valores por defecto del subchart frontend
# Son sobreescritos por el chart padre en la sección "frontend:" de values.yaml

image:
  repository: nginx
  tag: "alpine"
  pullPolicy: IfNotPresent

replicaCount: 1

service:
  type: ClusterIP
  port: 80

resources:
  requests:
    cpu: "50m"
    memory: "64Mi"
  limits:
    cpu: "200m"
    memory: "128Mi"
